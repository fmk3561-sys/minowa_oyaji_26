<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Go To GreenExpo byおやじ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fredoka+One&display=swap');
:root{--gd:#2d6a4f;--gm:#40916c;--gl:#74c69d;--gp:#d8f3dc;--ye:#f9c74f;--or:#f8961e;--wh:#fefefe;--tx:#1b3a2d;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(160deg,#1b4332 0%,#2d6a4f 40%,#40916c 100%);height:100vh;display:flex;flex-direction:column;align-items:center;color:var(--wh);overflow:hidden;}
#app{width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.app-title{text-align:center;padding:7px 12px 4px;background:rgba(0,0,0,0.25);border-bottom:2px solid var(--gl);flex-shrink:0;}
.app-title h1{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--ye);text-shadow:0 2px 8px rgba(0,0,0,.4);}
.app-title .sub{font-size:.62rem;color:var(--gp);opacity:.85;}
.map-area{position:relative;width:100%;height:140px;background:#0d2b1a;overflow:hidden;border-bottom:2px solid var(--gl);flex-shrink:0;}
.map-intro-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px;text-align:center;z-index:5;pointer-events:none;}
.map-intro-text p{font-size:.74rem;line-height:1.5;color:var(--gp);background:rgba(0,0,0,.5);border-radius:10px;padding:8px 12px;border:1px solid var(--gl);}
.map-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:0;width:100%;height:100%;position:absolute;inset:0;z-index:2;}
.map-piece{position:relative;overflow:hidden;border:none;background:rgba(0,0,0,.75);transition:opacity .7s cubic-bezier(.22,1,.36,1),background .7s;opacity:0;}
.map-piece.revealed{opacity:1;background:transparent;}
.map-piece img{position:absolute;width:300%;height:200%;object-fit:cover;display:block;pointer-events:none;}
.map-piece[data-i="0"] img{left:0%;top:0%;}
.map-piece[data-i="1"] img{left:-100%;top:0%;}
.map-piece[data-i="2"] img{left:-200%;top:0%;}
.map-piece[data-i="3"] img{left:0%;top:-100%;}
.map-piece[data-i="4"] img{left:-100%;top:-100%;}
.map-piece[data-i="5"] img{left:-200%;top:-100%;}
.piece-flash{position:absolute;inset:0;background:radial-gradient(circle,#f9c74fcc 0%,transparent 70%);animation:flashIn .8s ease forwards;z-index:10;}
@keyframes flashIn{0%{opacity:1;transform:scale(.5)}60%{opacity:.6;transform:scale(1.1)}100%{opacity:0;transform:scale(1)}}
.bottom{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 12px 6px;overflow:hidden;min-height:0;}
.score-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:5px 2px 4px;font-size:.78rem;color:var(--gp);border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:7px;flex-shrink:0;}
.score-bar .correct{color:var(--ye);font-weight:700;font-size:.92rem;}
.quiz-card{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);border-radius:14px;padding:11px 13px 9px;backdrop-filter:blur(6px);flex-shrink:0;}
.q-number{font-size:.66rem;letter-spacing:2px;color:var(--gl);margin-bottom:4px;}
.q-text{font-size:.97rem;font-weight:700;line-height:1.45;color:var(--wh);margin-bottom:9px;}
.choices{display:flex;flex-direction:column;gap:7px;}
.choice-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:9px 12px;color:var(--wh);font-family:'Noto Sans JP',sans-serif;font-size:.9rem;cursor:pointer;text-align:left;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.choice-btn:active{transform:scale(.97);}
.choice-btn .label{width:24px;height:24px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.8rem;flex-shrink:0;}
.choice-btn.correct-ans{background:rgba(116,198,157,.35);border-color:var(--gl);}
.choice-btn.wrong-ans{background:rgba(220,50,50,.2);border-color:rgba(220,50,50,.5);opacity:.6;}
.choice-btn:disabled{cursor:default;}
.feedback-inline{margin-top:7px;text-align:center;font-size:.86rem;font-weight:700;color:#ff8fa3;min-height:18px;}
.feedback-overlay{display:none;position:fixed;inset:0;z-index:100;align-items:center;justify-content:center;pointer-events:none;}
.feedback-overlay.show{display:flex;}
.feedback-badge{font-size:5rem;animation:popBig .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popBig{0%{transform:scale(.1) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.celebration-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;}
.celebration-overlay.show{display:flex;}
.celeb-emoji{font-size:5.5rem;animation:celebPop .5s cubic-bezier(.34,1.56,.64,1) both;}
.celeb-text{font-size:1.6rem;font-weight:900;color:var(--ye);text-shadow:0 0 24px #f9c74f;animation:celebSlide .5s ease .2s both;}
.celeb-sub{font-size:.92rem;color:var(--gp);animation:celebSlide .5s ease .35s both;padding:0 20px;line-height:1.5;}
@keyframes celebPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes celebSlide{0%{transform:translateY(20px);opacity:0}100%{transform:translateY(0);opacity:1}}
.confetti-piece{position:fixed;animation:confettiFall linear forwards;z-index:199;pointer-events:none;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.2}}
.result-screen,.start-screen{display:none;flex-direction:column;align-items:center;text-align:center;padding:10px 8px;gap:8px;overflow-y:auto;}
.result-screen.show,.start-screen.show{display:flex;}
.result-title{font-family:'Fredoka One',cursive;font-size:1.45rem;color:var(--ye);text-shadow:0 2px 8px rgba(0,0,0,.4);}
.rank-badge{display:inline-block;font-size:1.05rem;font-weight:900;padding:6px 20px;border-radius:20px;margin-top:2px;}
.countdown{font-size:.84rem;color:var(--gp);line-height:1.6;background:rgba(0,0,0,.3);border-radius:10px;padding:8px 14px;}
.countdown .days{font-size:1.8rem;font-weight:900;color:var(--ye);display:block;}
.emoji-big{font-size:2rem;}
.retry-btn{padding:11px 28px;background:var(--ye);border:none;border-radius:12px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:.97rem;font-weight:900;cursor:pointer;transition:transform .15s;}
.retry-btn:active{transform:scale(.97);}
.start-btn{padding:12px 32px;background:linear-gradient(135deg,var(--ye),var(--or));border:none;border-radius:14px;color:var(--tx);font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;box-shadow:0 4px 14px rgba(248,150,30,.4);transition:transform .15s;}
.start-btn:active{transform:scale(.97);}
.hidden{display:none!important;}

/* RESULT PAGES */
.result-page { display:none; flex-direction:column; align-items:center; text-align:center; padding:6px 8px; gap:5px; width:100%; }
.result-page.show { display:flex; }
.rank-img { width:110px; height:110px; object-fit:contain; border-radius:14px; animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.rank-name { font-size:1.1rem; font-weight:900; color:var(--ye); text-shadow:0 0 12px rgba(249,199,79,.5); }
.next-btn {
  padding:9px 28px; background:linear-gradient(135deg,var(--gm),var(--gd));
  border:none; border-radius:12px; color:var(--wh);
  font-family:'Noto Sans JP',sans-serif; font-size:.95rem; font-weight:900;
  cursor:pointer; transition:transform .15s; border:1.5px solid var(--gl);
}
.next-btn:active{transform:scale(.97);}
.support-text {
  font-size:.8rem; line-height:1.7; color:var(--gp);
  background:rgba(0,0,0,.25); border-radius:10px;
  padding:10px 14px; border:1px solid rgba(255,255,255,.1);
}
.support-text strong { color:var(--ye); font-size:.88rem; }
.map-area.hidden-before-start { display:none !important; }
</style>
</head>

// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;
let ac=null;
function gAC(){
  if(!ac) ac=new AC();
  if(ac.state==='suspended') ac.resume();
  return ac;
}

// 正解音：コイン取得風 — 短い上昇アルペジオ＋キラキラ余韻
function playCorrect(){
  try{
    const ctx=gAC(), now=ctx.currentTime;
    // メインの上昇アルペジオ（サイン波）
    const notes=[523,659,784,1047];
    notes.forEach((freq,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=freq;
      const t=now+i*0.08;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
      o.start(t); o.stop(t+0.3);
    });
    // キラキラ高音（triangle波 × 2）
    [[1568,0.28],[2093,0.38]].forEach(([freq,delay])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='triangle'; o.frequency.value=freq;
      const t=now+delay;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.12,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.4);
    });
  }catch(e){}
}

// 不正解音：ゲームオーバー風ブザー — 下降音＋低いノイズ
function playWrong(){
  try{
    const ctx=gAC(), now=ctx.currentTime;
    // マスターゲインで全体音量を正解音と揃える
    const master=ctx.createGain();
    master.gain.setValueAtTime(1.0, now);
    master.connect(ctx.destination);
    // 下降するブザー（sawtooth）
    const o1=ctx.createOscillator(), g1=ctx.createGain();
    o1.connect(g1); g1.connect(master);
    o1.type='sawtooth';
    o1.frequency.setValueAtTime(440, now);
    o1.frequency.linearRampToValueAtTime(110, now+0.45);
    g1.gain.setValueAtTime(0.55, now);
    g1.gain.exponentialRampToValueAtTime(0.001, now+0.48);
    o1.start(now); o1.stop(now+0.5);
    // 重なる低音（square波）でパンチを追加
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.connect(g2); g2.connect(master);
    o2.type='square';
    o2.frequency.setValueAtTime(220, now);
    o2.frequency.linearRampToValueAtTime(80, now+0.3);
    g2.gain.setValueAtTime(0.35, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now+0.35);
    o2.start(now); o2.stop(now+0.4);
    // 短いホワイトノイズ（ドスッ感）
    const bufSize=ctx.sampleRate*0.12;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i]=(Math.random()*2-1);
    const src=ctx.createBufferSource(), gn=ctx.createGain();
    const lpf=ctx.createBiquadFilter();
    lpf.type='lowpass'; lpf.frequency.value=400;
    src.buffer=buf;
    src.connect(lpf); lpf.connect(gn); gn.connect(master);
    gn.gain.setValueAtTime(0.45, now);
    gn.gain.exponentialRampToValueAtTime(0.001, now+0.12);
    src.start(now); src.stop(now+0.15);
  }catch(e){}
}

// クリア・全問正解ファンファーレ：明るい勝利メロディ
function playFanfare(){
  try{
    const ctx=gAC(), now=ctx.currentTime;
    // メロディライン
    const melody=[
      [523,0],[659,0.13],[784,0.26],[1047,0.39],
      [784,0.52],[1047,0.60],[1047,0.72]
    ];
    melody.forEach(([freq,delay])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=freq;
      const t=now+delay;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
      o.start(t); o.stop(t+0.25);
    });
    // 低音の和音サポート
    [[262,0],[330,0.26],[392,0.39],[523,0.60]].forEach(([freq,delay])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='triangle'; o.frequency.value=freq;
      const t=now+delay;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.14,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
      o.start(t); o.stop(t+0.22);
    });
  }catch(e){}
}

// ===== CONFETTI =====
const CC=['#f9c74f','#74c69d','#ff8fa3','#90e0ef','#f8961e','#aef3b0','#fff','#c77dff'];
function launchConfetti(n){
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=CC[Math.floor(Math.random()*CC.length)];
    const sz=7+Math.random()*9;
    el.style.width=sz+'px';el.style.height=sz+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'3px';
    const dur=1.5+Math.random()*2;
    el.style.animationDuration=dur+'s';
    el.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),(dur+1)*1000);
  }
}

  {q:'「再生資源(さいせいしげん)」という言葉の意味は、次のうちどれかな?',c:['二度と使えないゴミ','宇宙(うちゅう)から降ってきた石','もう一度使えるようにした資源(しげん)'],a:2},
  {q:'使い終わった後に「再生資源(さいせいしげん)」として生まれ変われるものはどれかな?',c:['使い終わった紙やペットボトル','食べ残したごはん','壊(こわ)れたガラスの破片(はへん)'],a:0},
  {q:'「グリーンリサイクル」の意味は、次のうちどれかな?',c:['緑色の服を洗うこと','自然(しぜん)にやさしいやり方でもう一度使うこと','木をぜんぶ切ってしまうこと'],a:1},
  {q:'落ち葉や草を集めて栄養(えいよう)たっぷりの土にすることを、何というかな?',c:['カーボンニュートラル','クールビズ','グリーンリサイクル'],a:2},
  {q:'夏をすずしく過ごすための工夫(くふう)、「クールビズ」の意味はどれかな?',c:['夏に電気を使いすぎず、すずしく過ごす工夫','冬を楽しく過ごすこと','毎日アイスを食べること'],a:0},
  {q:'「クールビズ」の取り組みとして、正しいアクションは何かな?',c:['分厚(ぶあつ)いコートを夏に着る','すずしい服を着たり、ネクタイをはずしたりする','エアコンの設定温度(せっていおんど)をとても低くする'],a:1},
  {q:'2つのものを組み合わせてパワーアップさせる「ハイブリッド」の意味はどれかな?',c:['1つだけで何でもできること','とても古いやり方のこと','2つの良いところを「組み合わせる」こと'],a:2},
  {q:'「ハイブリッド」な乗り物として、有名な車は何と何で走るかな?',c:['ガソリンと電気の両方(りょうほう)','磁石(じしゃく)とバネ','魔法(まほう)と風'],a:0},
  {q:'横浜(よこはま)で開催(かいさい)される「グリーンエキスポ」は、どんなイベントかな?',c:['かけっこを競(きそ)う大会','花や自然(しぜん)、環境(かんきょう)について考える楽しいお祭り','お菓子をたくさん売るの場所'],a:1},
  {q:'「グリーンエキスポ」に行くと、どんな体験(たいけん)ができるかな?',c:['室内(しつない)で遊ぶ','昼寝をする','地球にやさしいくらしを学んだり、植物(しょくぶつ)を見たりする'],a:2},
  {q:'グリーンエキスポの大切なテーマ「しあわせをつくるあしたのふうけい」は、何のことかな?',c:['一番大切な「合言葉(あいことば)」','働いているスタッフ全員の名前','お弁当に入れるおかずの名前'],a:0},
  {q:'グリーンエキスポが目指(めざ)す「しあわせをつくるあしたのふうけい」とは、どんな未来のことかな?',c:['自然がぜんぶ無くなってしまった未来','みんなが笑顔で、自然と一緒に暮らせる未来','毎日が大嵐(おおあらし)の未来'],a:1},
  {q:'「グリーンエキスポ(横浜花博)」は、西暦(せいれき)何年に開催(かいさい)されるかな?',c:['2024年','2030年','2027年'],a:2},
  {q:'「グリーンエキスポ」が行われる場所(ばしょ)はどこかな?',c:['神奈川県(かながわけん)','東京都(とうきょうと)','大阪府(おおさかふ)'],a:0},
  {q:'グリーンエキスポの会場まで行くのに、一番地球にやさしい方法はどれかな?',c:['走る','電車やシャトルバスなどの公共(こうきょう)の乗り物','自分の専用(せんよう)の船'],a:1},
  {q:'グリーンエキスポの会場の明かりは、どんな工夫がされているかな?',c:['大きな電池をたくさん買ってくる','キャンドルの火だけで過ごす','太陽の光などのクリーンエネルギーをなるべく使う'],a:2},
  {q:'会場に「マイボトル(水筒)」を持っていくと、どんな良いことがあるかな?',c:['ペットボトルのゴミをへらすことができる','水筒(すいとう)がとても重くなる','新しいおもちゃがもらえる'],a:0},
  {q:'グリーンエキスポの会場で見ることができる植物は、どれくらいかな?',c:['100本くらい','数えきれないくらい','ひとつもない'],a:1},
  {q:'子どもたちが楽しく自然を学べる、会場にある場所の名前は何かな?',c:['おとなの会議室','お昼寝コーナー','キッズヴィレッジ'],a:2},
  {q:'グリーンエキスポの会場で一度使った水は、どうしているかな?',c:['きれいにして、もう一度使う','そのまま川へ捨てる','全部飲みほしてしまう'],a:0},
  {q:'会場でプラスチックのゴミをへらすために行っている工夫は何かな?',c:['プラスチックを地面に深くうめる','使い捨て(つかいすて)の容器(ようき)をなるべく使わない','プラスチックはぜんぶ燃(も)やしてなくす'],a:1},
  {q:'グリーンエキスポは、どのくらいの期間(きかん)開催(かいさい)される?',c:['1週間','1ヶ月','半年(はんとし)'],a:2},
];

const LABELS=['①','②','③'];
let questions=[],qIdx=0,correctCount=0,answered=false,pieceOrder=[],revealedPieces=0,timer=null;

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startGame(){
  questions=shuffle(ALL_QUESTIONS).slice(0,10);
  qIdx=0;correctCount=0;answered=false;revealedPieces=0;
  pieceOrder=shuffle([0,1,2,3,4,5]);
  clearTimeout(timer);
  buildGrid();
  document.getElementById('mapArea').classList.remove('hidden-before-start');
  document.getElementById('mapIntroText').style.display='none';
  document.getElementById('startScreen').classList.remove('show');
  document.getElementById('scoreBar').classList.remove('hidden');
  document.getElementById('quizCard').classList.remove('hidden');
  document.getElementById('resultPage1').classList.remove('show');
  document.getElementById('resultPage2').classList.remove('show');
  document.getElementById('feedbackOverlay').classList.remove('show');
  document.getElementById('celebOverlay').classList.remove('show');
  updateBar();showQ();
}

function updateBar(){
  document.getElementById('qNum').textContent=qIdx+1;
  document.getElementById('correctCount').textContent=correctCount;
}

function showQ(){
  answered=false;clearTimeout(timer);
  document.getElementById('feedbackOverlay').classList.remove('show');
  document.getElementById('feedbackInline').textContent='';
  const q=questions[qIdx];
  document.getElementById('qNumber').textContent='QUESTION '+(qIdx+1);
  document.getElementById('qText').textContent=q.q;
  const el=document.getElementById('choices');el.innerHTML='';
  q.c.forEach((txt,i)=>{
    const btn=document.createElement('button');btn.className='choice-btn';
    btn.innerHTML=`<span class="label">${LABELS[i]}</span><span>${txt}</span>`;
    btn.onclick=()=>pick(i);el.appendChild(btn);
  });
  updateBar();
}

function revealPiece(){
  if(revealedPieces>=6)return;
  const idx=pieceOrder[revealedPieces];revealedPieces++;
  const p=document.querySelector(`.map-piece[data-i="${idx}"]`);
  p.classList.add('revealed');
  const fl=document.createElement('div');fl.className='piece-flash';
  p.appendChild(fl);setTimeout(()=>fl.remove(),900);
}

function showBigFeedback(emoji){
  document.getElementById('feedbackBadge').textContent=emoji;
  document.getElementById('feedbackOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('feedbackOverlay').classList.remove('show'),800);
}

function pick(i){
  if(answered)return;answered=true;
  const q=questions[qIdx];
  document.querySelectorAll('.choice-btn').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a)b.classList.add('correct-ans');
    else if(idx===i)b.classList.add('wrong-ans');
  });
  const ok=(i===q.a);
  if(ok){correctCount++;playCorrect();revealPiece();showBigFeedback('⭕');}
  else{playWrong();showBigFeedback('❌');document.getElementById('feedbackInline').textContent='❌ 正解は '+LABELS[q.a]+' だよ！';}
  qIdx++;updateBar();
  const delay=ok?950:1600;
  // 6問正解でクリア（その時点で終了）
  if(ok && correctCount>=6){
    timer=setTimeout(()=>{
      if(correctCount===10)showCelebration();
      else showClear();
    },delay);
  } else if(qIdx>=10){
    timer=setTimeout(showResult,delay);
  } else {
    timer=setTimeout(showQ,delay);
  }
}

function getCD(){
  const now=new Date();now.setHours(0,0,0,0);
  const open=new Date('2027-03-19');open.setHours(0,0,0,0);
  const close=new Date('2027-06-26');close.setHours(0,0,0,0);
  const d=(a,b)=>Math.round((a-b)/86400000);
  if(now<open)return`<div class="countdown">🌱 開催まで<br><span class="days">${d(open,now)}日</span>楽しみだね！</div>`;
  if(now<=close)return`<div class="countdown">🎉 終了まで<br><span class="days">${d(close,now)}日</span>早く行こう！</div>`;
  return`<div class="countdown">😢 終わっちゃった…<br>次の万博はいつかな？</div>`;
}

function hideQuizUI(){
  clearTimeout(timer);
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('scoreBar').classList.add('hidden');
  document.getElementById('feedbackOverlay').classList.remove('show');
}

function getRankImg(misses){
  if(misses===0) return {key:'hero',   name:'地球ヒーロー',  img:RANK_IMGS.hero};
  if(misses===1) return {key:'hakase', name:'地球はかせ',    img:RANK_IMGS.hakase};
  if(misses===2) return {key:'explorer',name:'地球探検家',   img:RANK_IMGS.explorer};
  if(misses<=4)  return {key:'ippanjin',name:'地球一般人',   img:RANK_IMGS.ippanjin};
  return           {key:'shiroto', name:'地球素人',    img:RANK_IMGS.shiroto};
}

function showPage1(mapOk){
  const misses = qIdx - correctCount;
  const rankImg = getRankImg(misses);
  const p1 = document.getElementById('resultPage1');
  p1.innerHTML='';p1.classList.add('show');
  p1.innerHTML=`
    <div class="result-title" style="font-size:1.25rem;margin-bottom:2px;">${mapOk?'会場図が揃ったよ！':'会場図は揃わなかった…'}</div>
    <div style="font-size:.8rem;color:var(--gp);margin-bottom:2px;">スコア：<strong style="color:var(--ye);font-size:.95rem;">${correctCount}</strong> / ${qIdx}問正解</div>
    <img class="rank-img" src="${rankImg.img}" alt="${rankImg.name}">
    <div class="rank-name" style="font-size:.95rem;line-height:1.5;">ミスが${misses}こだった君は「<strong>${rankImg.name}</strong>」だよ！<br>また挑戦してね！！</div>
    <button class="next-btn" onclick="showPage2()">つぎへ →</button>`;
}

function showPage2(){
  document.getElementById('resultPage1').classList.remove('show');
  const p2 = document.getElementById('resultPage2');
  p2.innerHTML='';p2.classList.add('show');
  p2.innerHTML=`
    ${getCD()}
    <div class="support-text">
      <strong>🌿 台小・箕輪小おやじの会は<br>GREEN×EXPOを応援しています！ 🌿</strong>
    </div>
    <button class="retry-btn" onclick="restartGame()">もう一度チャレンジ！</button>`;
}

function showClear(){
  hideQuizUI();
  playFanfare();
  launchConfetti(60);
  showPage1(true);
}

function showResult(){
  hideQuizUI();
  showPage1(revealedPieces>=6);
}

function restartGame(){
  document.getElementById('resultPage1').classList.remove('show');
  document.getElementById('resultPage2').classList.remove('show');
  document.getElementById('celebOverlay').classList.remove('show');
  document.getElementById('scoreBar').classList.add('hidden');
  document.getElementById('quizCard').classList.add('hidden');
  document.getElementById('feedbackOverlay').classList.remove('show');
  // 会場図を非表示に戻す
  document.getElementById('mapArea').classList.add('hidden-before-start');
  // スタート画面を表示
  document.getElementById('startScreen').classList.add('show');
}

buildGrid();
</script>
</body>
